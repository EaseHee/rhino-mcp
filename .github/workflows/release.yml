name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.3.1)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    name: Build rhino-mcp Python wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dev deps
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest tests/ -q
      - name: Static analysis
        run: |
          uv run ruff check src/ tests/
          uv run mypy src/rhino_mcp || true
      - name: Build wheel + sdist
        run: uv build
      - name: Publish to PyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
      - name: Attach artefacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

  build-rhp:
    name: Build rhino-mcp .rhp
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Build Release .rhp
        run: dotnet build rhino_plugin/csharp -c Release
      - name: Upload artefact
        uses: actions/upload-artifact@v6
        with:
          name: rhino-mcp-build
          path: rhino_plugin/csharp/bin/Release/net8.0/
      - name: Attach .rhp to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: rhino_plugin/csharp/bin/Release/net8.0/rhino-mcp.rhp

  build-yak:
    name: Build rhino-mcp .yak
    needs: build-rhp
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: rhino-mcp-build
          path: rhino_plugin/csharp/bin/Release/net8.0/
      - name: Locate yak.exe
        id: yak
        shell: bash
        run: |
          yak="C:/Program Files/Rhino 8/System/yak.exe"
          if [ ! -f "$yak" ]; then
            echo "Yak not present on the runner; skipping .yak build."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=$yak" >> "$GITHUB_OUTPUT"
      - name: Build .yak (win)
        if: steps.yak.outputs.found == 'true'
        shell: bash
        env:
          YAK_CLI: ${{ steps.yak.outputs.path }}
        run: ./scripts/publish-yak.sh --skip-build --platform=win
      - name: Attach .yak to release
        if: steps.yak.outputs.found == 'true' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: rhino_plugin/csharp/dist/*.yak
