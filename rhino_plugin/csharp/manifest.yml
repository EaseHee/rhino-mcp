description: |
  RhinoCommon + Grasshopper bridge for the rhino-mcp MCP server.
  Loads as a Rhino 8 plug-in and exposes a JSON-RPC listener over a
  platform-native transport (named pipe on Windows, Unix socket on
  macOS/Linux, optional TCP). The MCP server (separate process) auto-
  detects the bridge on startup.
